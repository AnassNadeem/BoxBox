# Model roster. openrouter_id values are resolved/verified by scripts/verify_models.py
# against GET https://openrouter.ai/api/v1/models (free). Until verified, ids are
# best-guess placeholders and enabled stays false for real runs (mock mode ignores
# `enabled` gating only when --models all-mock is passed).
# pricing_* are USD per million tokens, filled from the OpenRouter listing.
models:
  - name: claude-fable-5
    openrouter_id: anthropic/claude-fable-5
    pricing_in_per_mtok: null
    pricing_out_per_mtok: null
