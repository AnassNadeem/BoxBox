# Benchmark run settings — MAIN PASS (one deterministic call per model x DP)
temperature: 0.0
max_tokens: 1200           # reasoning models (Fable 5, GPT-5.5, Gemini 3.1) consume this
                           # budget on thinking before emitting JSON; 350 starved them
                           # (empty/truncated output with finish_reason=length)
repeats: 1                # single-shot main pass; flip rate comes from the probe only
spend_cap_usd: 20.00      # hard abort if projected spend exceeds this (main + probe)
mock_invalid_rate: 0.04   # fraction of mock responses that are deliberately malformed
mock_pit_rate: 0.30       # mock models answer PIT ~30% of the time

# Consistency probe — run AFTER the main pass; the ONLY source of the flip rate.
# Selects the decision points where models disagreed most in the main pass and
# resamples them; selection is logged to outputs/probe_selection.json.
consistency_probe:
  n_decision_points: 20   # DPs with the highest cross-model action disagreement
  samples: 5              # samples per (model, dp)
  temperature: 1.0        # provider-default sampling temperature

simulator:
  candidate_stop_laps_max_ahead: 999   # search stop laps t..min(t+this, total-last_laps); 999 = to end
  rejoin_penalty_s: 0.0                # flat penalty added on rejoin after a pit (v1 default off)
  sc_pit_loss_factor_default: 0.55     # used when not computable from the race's own SC-era stops
  min_clean_laps_for_fit: 4
  outlier_mad: 3.0

live:
  poll_seconds: 45
  tyre_age_trigger: 18      # Type A proxy: trigger when focal tyre age crosses this
  stale_data_tolerance_s: 180
  # Scheduled race distance. OpenF1 gives no total-laps field, and a LIVE race's
  # max-lap-seen is only the current lap, which would make the loop think the race is
  # already over. Set this to the event's lap count (Barcelona 2026 = 66).
  total_laps: 66
  # Only cars on these teams generate model-call triggers (match is case-insensitive
  # substring, so "Red Bull" matches "Red Bull Racing"). Other cars are still ingested
  # for race state. Incident detection (SC/VSC/flags/race_control) stays global.
  # Empty list = track every car (back-compat).
  tracked_teams: [Ferrari, McLaren, Red Bull, Mercedes]
