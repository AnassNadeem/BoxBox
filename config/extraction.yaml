# Decision-point extraction thresholds (OVERNIGHT_TASK.md §6).
# Changing any value here is a logged decision -> docs/DECISIONS.md.

type_a:
  # laps before each real pit stop at which to emit DPs (0 = the stop lap itself)
  offsets: [2, 1, 0]
type_b:
  top_n_positions: 10        # emit for cars running in the top N on SC/VSC deployment
type_c:
  rival_gap_s: 3.5           # |gap| to count a car as a direct rival

dedupe_priority: [B, C, A]   # higher first for same (car, lap)
max_dp_per_race: 18          # cap; quota_per_type slots per type within it
quota_per_type: 6            # target DPs per type (A/B/C); a type short of this
                             # donates unused slots to the others, B > C > A first

exclude:
  first_laps: 3              # never emit at lap t <= 3
  last_laps: 2               # never emit at lap t > total_laps - 2
  lapped_cars: true
  retirement_window_laps: 3  # no DPs within 3 laps of a car's retirement

state:
  last_n_lap_times: 3
  top_n_summary: 10

# Wet-conditions detection. INTER/WET is offered in compounds_available (and a DP is
# tagged changeable_conditions) ONLY if the field actually ran wet tyres / had
# rain-affected laps within this many laps of the decision lap t (window [t-w, t], so
# <= t and leakage-safe). Replaces the race-level Rainfall.any() flag AND the "any wet
# lap seen so far" latch, which over-offered INTER in dry phases (Miami false positive;
# Canada early-damp latch). See docs/DECISIONS.md.
wet:
  window_laps: 5

